openapi: 3.1.0
info:
  title: Durable Streams Protocol
  summary: Path-addressed durable byte streams with long-polling, SSE, subscriptions, and scheduled appends.
  version: 0.0.0
tags:
  - name: Streams
  - name: Subscriptions
  - name: Schedules
paths:
  /v1/stream/__ds/jwks.json:
    get:
      operationId: Subscriptions_getWebhookSigningKeys
      summary: Get webhook signing keys
      description: Discover public webhook signing keys.
      parameters: []
      responses:
        '200':
          description: Public JSON Web Key Set used to verify Durable Streams webhook signatures.
          headers:
            Cache-Control:
              required: true
              schema:
                type: string
          content:
            application/jwk-set+json:
              schema:
                $ref: '#/components/schemas/JsonWebKeySet'
      tags:
        - Subscriptions
  /v1/stream/__ds/schedules/{id}:
    put:
      operationId: Schedules_putSchedule
      summary: Create or confirm a scheduled append
      description: Create or idempotently confirm a scheduled append.
      parameters:
        - $ref: '#/components/parameters/ScheduleIdParam'
      responses:
        '200':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '201':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '400':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '409':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
        '429':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
      tags:
        - Schedules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleRequest'
            examples:
              Schedule a JSON append:
                summary: Schedule a JSON append
                value:
                  at: '2026-01-01T00:00:00Z'
                  stream: events/orders
                  content_type: application/json
                  body:
                    type: order.timeout
                    orderId: ord_123
    get:
      operationId: Schedules_getSchedule
      summary: Get a schedule
      description: Read a scheduled append.
      parameters:
        - $ref: '#/components/parameters/ScheduleIdParam'
      responses:
        '200':
          description: Schedule state result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '404':
          description: Schedule state result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '410':
          description: Schedule state result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
        '429':
          description: Schedule state result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
      tags:
        - Schedules
    delete:
      operationId: Schedules_deleteSchedule
      summary: Cancel a schedule
      description: Cancel a pending scheduled append.
      parameters:
        - $ref: '#/components/parameters/ScheduleIdParam'
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '404':
          description: Cancel result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '410':
          description: Cancel result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
        '429':
          description: Cancel result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
      tags:
        - Schedules
  /v1/stream/__ds/subscriptions/{id}:
    put:
      operationId: Subscriptions_createSubscription
      summary: Create or confirm a subscription
      description: Create or idempotently re-confirm a subscription.
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdParam'
      responses:
        '200':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '201':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '409':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
        '429':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
      tags:
        - Subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionConfig'
            examples:
              Create a webhook subscription:
                summary: Create a webhook subscription
                value:
                  type: webhook
                  pattern: events/*
                  webhook:
                    url: https://example.com/durable-streams/webhook
                  lease_ttl_ms: 30000
    get:
      operationId: Subscriptions_getSubscription
      summary: Get a subscription
      description: Read subscription configuration, membership, cursor, and delivery status.
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdParam'
      responses:
        '200':
          description: Subscription state result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '404':
          description: Subscription state result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '410':
          description: Subscription state result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
        '429':
          description: Subscription state result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
      tags:
        - Subscriptions
    delete:
      operationId: Subscriptions_deleteSubscription
      summary: Delete a subscription
      description: Tombstone a subscription.
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdParam'
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '404':
          description: Delete result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '410':
          description: Delete result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
        '429':
          description: Delete result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
      tags:
        - Subscriptions
  /v1/stream/__ds/subscriptions/{id}/ack:
    post:
      operationId: Subscriptions_ack
      summary: Acknowledge pull-wake progress
      description: Ack processed offsets and optionally release the current claim.
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdParam'
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
            format: password
      responses:
        '200':
          description: Acknowledgement result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallbackOk'
        '401':
          description: Acknowledgement result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyError'
        '404':
          description: Acknowledgement result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '409':
          description: Acknowledgement result or a documented protocol error.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    $ref: '#/components/schemas/FencedError'
        '410':
          description: Acknowledgement result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
      tags:
        - Subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallbackRequest'
  /v1/stream/__ds/subscriptions/{id}/callback:
    post:
      operationId: Subscriptions_callback
      summary: Complete webhook delivery
      description: Webhook asynchronous completion callback.
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdParam'
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
            format: password
      responses:
        '200':
          description: Webhook callback result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallbackOk'
        '401':
          description: Webhook callback result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyError'
        '404':
          description: Webhook callback result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '409':
          description: Webhook callback result or a documented protocol error.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    $ref: '#/components/schemas/FencedError'
        '410':
          description: Webhook callback result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
      tags:
        - Subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallbackRequest'
  /v1/stream/__ds/subscriptions/{id}/claim:
    post:
      operationId: Subscriptions_claim
      summary: Claim pull-wake work
      description: Claim pending work for a pull-wake subscription.
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdParam'
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
            format: password
      responses:
        '200':
          description: Claim result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimSuccess'
        '401':
          description: Claim result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyError'
        '404':
          description: Claim result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '409':
          description: Claim result or a documented protocol error.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    $ref: '#/components/schemas/AlreadyClaimedError'
        '410':
          description: Claim result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
      tags:
        - Subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimRequest'
  /v1/stream/__ds/subscriptions/{id}/release:
    post:
      operationId: Subscriptions_release
      summary: Release pull-wake claim
      description: Release the current pull-wake claim without acking offsets.
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdParam'
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
            format: password
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '401':
          description: Release result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyError'
        '404':
          description: Release result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '409':
          description: Release result or a documented protocol error.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    $ref: '#/components/schemas/FencedError'
        '410':
          description: Release result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
      tags:
        - Subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseRequest'
  /v1/stream/__ds/subscriptions/{id}/streams:
    post:
      operationId: Subscriptions_addSubscriptionStreams
      summary: Add subscription stream links
      description: Add explicit stream links to a subscription.
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdParam'
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '400':
          description: Stream membership update result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '404':
          description: Stream membership update result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '410':
          description: Stream membership update result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
        '429':
          description: Stream membership update result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
      tags:
        - Subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamMembershipRequest'
  /v1/stream/__ds/subscriptions/{id}/streams/{path}:
    delete:
      operationId: Subscriptions_removeSubscriptionStream
      summary: Remove a subscription stream link
      description: Remove one explicit stream link from a subscription.
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdParam'
        - $ref: '#/components/parameters/ControlPathParam'
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '404':
          description: Stream membership update result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '410':
          description: Stream membership update result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
        '429':
          description: Stream membership update result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
      tags:
        - Subscriptions
  /v1/stream/{path}:
    put:
      operationId: Streams_createStream
      summary: Create or confirm a stream
      description: Create a stream, create a fork, or idempotently confirm an existing stream.
      parameters:
        - $ref: '#/components/parameters/StreamUrlPathParam'
        - $ref: '#/components/parameters/StreamCreateHeaders.streamTtl'
        - $ref: '#/components/parameters/StreamCreateHeaders.streamExpiresAt'
        - $ref: '#/components/parameters/StreamClosedRequestHeader'
        - $ref: '#/components/parameters/StreamCreateHeaders.streamForkedFrom'
        - $ref: '#/components/parameters/StreamCreateHeaders.streamForkOffset'
        - $ref: '#/components/parameters/StreamCreateHeaders.streamForkSubOffset'
      responses:
        '200':
          description: Create or confirm result, or a documented protocol error.
          headers:
            Stream-Next-Offset:
              required: true
              schema:
                $ref: '#/components/schemas/Offset'
            Stream-Closed:
              required: false
              schema:
                type: string
                enum:
                  - 'true'
        '201':
          description: Create or confirm result, or a documented protocol error.
          headers:
            Location:
              required: false
              schema:
                type: string
            Stream-Next-Offset:
              required: true
              schema:
                $ref: '#/components/schemas/Offset'
            Stream-Closed:
              required: false
              schema:
                type: string
                enum:
                  - 'true'
        '400':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '404':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '409':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
        '429':
          description: Create or confirm result, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
      tags:
        - Streams
      requestBody:
        required: false
        content:
          '*/*':
            schema:
              contentMediaType: '*/*'
    post:
      operationId: Streams_appendToStream
      summary: Append bytes to a stream
      description: Append bytes to a stream and optionally close it atomically.
      parameters:
        - $ref: '#/components/parameters/StreamUrlPathParam'
        - $ref: '#/components/parameters/StreamAppendHeaders.streamSeq'
        - $ref: '#/components/parameters/StreamClosedRequestHeader'
        - $ref: '#/components/parameters/StreamAppendHeaders.producerId'
        - $ref: '#/components/parameters/StreamAppendHeaders.producerEpoch'
        - $ref: '#/components/parameters/StreamAppendHeaders.producerSeq'
      responses:
        '200':
          description: Append result, including idempotent producer metadata when supplied, or a documented protocol error.
          headers:
            Stream-Next-Offset:
              required: true
              schema:
                $ref: '#/components/schemas/Offset'
            Stream-Closed:
              required: false
              schema:
                type: string
                enum:
                  - 'true'
            Producer-Epoch:
              required: false
              schema:
                $ref: '#/components/schemas/ProducerEpoch'
            Producer-Seq:
              required: false
              schema:
                $ref: '#/components/schemas/ProducerSeq'
        '204':
          description: Append result, including idempotent producer metadata when supplied, or a documented protocol error.
          headers:
            Stream-Next-Offset:
              required: true
              schema:
                $ref: '#/components/schemas/Offset'
            Stream-Closed:
              required: false
              schema:
                type: string
                enum:
                  - 'true'
            Producer-Epoch:
              required: false
              schema:
                $ref: '#/components/schemas/ProducerEpoch'
            Producer-Seq:
              required: false
              schema:
                $ref: '#/components/schemas/ProducerSeq'
        '400':
          description: Append result, including idempotent producer metadata when supplied, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '403':
          description: Append result, including idempotent producer metadata when supplied, or a documented protocol error.
          headers:
            Producer-Epoch:
              required: true
              schema:
                $ref: '#/components/schemas/ProducerEpoch'
        '404':
          description: Append result, including idempotent producer metadata when supplied, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '405':
          description: Append result, including idempotent producer metadata when supplied, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyError'
        '409':
          description: Append result, including idempotent producer metadata when supplied, or a documented protocol error.
          headers:
            Producer-Expected-Seq:
              required: false
              schema:
                $ref: '#/components/schemas/ProducerSeq'
            Producer-Received-Seq:
              required: false
              schema:
                $ref: '#/components/schemas/ProducerSeq'
            Stream-Closed:
              required: false
              schema:
                type: string
                enum:
                  - 'true'
            Stream-Next-Offset:
              required: false
              schema:
                $ref: '#/components/schemas/Offset'
        '410':
          description: Append result, including idempotent producer metadata when supplied, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
        '413':
          description: Append result, including idempotent producer metadata when supplied, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyError'
        '429':
          description: Append result, including idempotent producer metadata when supplied, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
        '501':
          description: Append result, including idempotent producer metadata when supplied, or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyError'
      tags:
        - Streams
      requestBody:
        required: false
        content:
          '*/*':
            schema:
              contentMediaType: '*/*'
    head:
      operationId: Streams_headStream
      summary: Read stream metadata
      description: Read stream metadata without transferring body bytes.
      parameters:
        - $ref: '#/components/parameters/StreamUrlPathParam'
      responses:
        '200':
          description: Stream metadata result or a documented protocol error.
          headers:
            Stream-Next-Offset:
              required: true
              schema:
                $ref: '#/components/schemas/Offset'
            Stream-Closed:
              required: false
              schema:
                type: string
                enum:
                  - 'true'
            Stream-TTL:
              required: false
              schema:
                type: string
            Stream-Expires-At:
              required: false
              schema:
                $ref: '#/components/schemas/Rfc3339DateTime'
            Cache-Control:
              required: false
              schema:
                type: string
        '404':
          description: Stream metadata result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '410':
          description: Stream metadata result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
        '429':
          description: Stream metadata result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
      tags:
        - Streams
    get:
      operationId: Streams_readStream
      summary: Read or follow a stream
      description: Read catch-up bytes, long-poll for new bytes, or stream SSE events.
      parameters:
        - $ref: '#/components/parameters/StreamUrlPathParam'
        - name: offset
          in: query
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/Offset'
              - type: string
                enum:
                  - '-1'
                  - now
          explode: false
        - name: live
          in: query
          required: false
          schema:
            type: string
            enum:
              - long-poll
              - sse
          explode: false
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: timeout
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Read, long-poll, SSE, cache validation, or documented protocol error result.
          headers:
            Cache-Control:
              required: true
              schema:
                type: string
            ETag:
              required: false
              schema:
                type: string
            Stream-Cursor:
              required: false
              schema:
                type: string
            Stream-Next-Offset:
              required: true
              schema:
                $ref: '#/components/schemas/Offset'
            Stream-Up-To-Date:
              required: false
              schema:
                type: string
                enum:
                  - 'true'
            Stream-Closed:
              required: false
              schema:
                type: string
                enum:
                  - 'true'
            X-Content-Type-Options:
              required: false
              schema:
                type: string
                enum:
                  - nosniff
            Stream-SSE-Data-Encoding:
              required: false
              schema:
                type: string
                enum:
                  - base64
          content:
            '*/*':
              schema:
                contentMediaType: '*/*'
            text/event-stream:
              schema:
                type: string
        '204':
          description: Read, long-poll, SSE, cache validation, or documented protocol error result.
          headers:
            Stream-Next-Offset:
              required: true
              schema:
                $ref: '#/components/schemas/Offset'
            Stream-Up-To-Date:
              required: true
              schema:
                type: string
                enum:
                  - 'true'
            Stream-Cursor:
              required: false
              schema:
                type: string
            Stream-Closed:
              required: false
              schema:
                type: string
                enum:
                  - 'true'
        '304':
          description: Read, long-poll, SSE, cache validation, or documented protocol error result.
        '400':
          description: Read, long-poll, SSE, cache validation, or documented protocol error result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '404':
          description: Read, long-poll, SSE, cache validation, or documented protocol error result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '410':
          description: Read, long-poll, SSE, cache validation, or documented protocol error result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
        '429':
          description: Read, long-poll, SSE, cache validation, or documented protocol error result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
      tags:
        - Streams
    delete:
      operationId: Streams_deleteStream
      summary: Delete a stream
      description: Delete a stream. Streams with active forks become soft-deleted.
      parameters:
        - $ref: '#/components/parameters/StreamUrlPathParam'
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '404':
          description: Delete result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '405':
          description: Delete result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyError'
        '410':
          description: Delete result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'
        '501':
          description: Delete result or a documented protocol error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyError'
      tags:
        - Streams
components:
  parameters:
    ControlPathParam:
      name: path
      in: path
      required: true
      description: URL-encoded stream-root-relative path used inside reserved control APIs.
      schema:
        $ref: '#/components/schemas/StreamRootRelativePath'
    ScheduleIdParam:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ScheduleId'
    StreamAppendHeaders.producerEpoch:
      name: Producer-Epoch
      in: header
      required: false
      schema:
        $ref: '#/components/schemas/ProducerEpoch'
    StreamAppendHeaders.producerId:
      name: Producer-Id
      in: header
      required: false
      schema:
        $ref: '#/components/schemas/ProducerId'
    StreamAppendHeaders.producerSeq:
      name: Producer-Seq
      in: header
      required: false
      schema:
        $ref: '#/components/schemas/ProducerSeq'
    StreamAppendHeaders.streamSeq:
      name: Stream-Seq
      in: header
      required: false
      schema:
        type: string
    StreamClosedRequestHeader:
      name: Stream-Closed
      in: header
      required: false
      schema:
        type: string
        enum:
          - 'true'
    StreamCreateHeaders.streamExpiresAt:
      name: Stream-Expires-At
      in: header
      required: false
      schema:
        $ref: '#/components/schemas/Rfc3339DateTime'
    StreamCreateHeaders.streamForkOffset:
      name: Stream-Fork-Offset
      in: header
      required: false
      schema:
        $ref: '#/components/schemas/Offset'
    StreamCreateHeaders.streamForkSubOffset:
      name: Stream-Fork-Sub-Offset
      in: header
      required: false
      schema:
        type: integer
        format: int64
    StreamCreateHeaders.streamForkedFrom:
      name: Stream-Forked-From
      in: header
      required: false
      schema:
        $ref: '#/components/schemas/StreamRootRelativePath'
    StreamCreateHeaders.streamTtl:
      name: Stream-TTL
      in: header
      required: false
      schema:
        type: string
    StreamUrlPathParam:
      name: path
      in: path
      required: true
      description: Stream-root-relative path. This value may contain slash-separated path segments.
      schema:
        $ref: '#/components/schemas/StreamRootRelativePath'
    SubscriptionIdParam:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/SubscriptionId'
  schemas:
    AbsoluteUrl:
      type: string
      format: uri
      description: Absolute HTTP or HTTPS URL.
    Ack:
      type: object
      required:
        - stream
        - offset
      properties:
        stream:
          $ref: '#/components/schemas/StreamRootRelativePath'
        offset:
          $ref: '#/components/schemas/Offset'
    AlreadyClaimedError:
      type: object
      required:
        - code
        - current_holder
        - generation
      properties:
        code:
          type: string
          enum:
            - ALREADY_CLAIMED
        current_holder:
          type: string
        generation:
          $ref: '#/components/schemas/LeaseGeneration'
      allOf:
        - $ref: '#/components/schemas/ProtocolError'
      examples:
        - code: ALREADY_CLAIMED
          current_holder: worker-a
          generation: 4
    AppendStreamRequest:
      type: object
      required:
        - path
      properties:
        path:
          allOf:
            - $ref: '#/components/schemas/StreamRootRelativePath'
          description: Stream-root-relative path. This value may contain slash-separated path segments.
        body:
          type: string
          contentEncoding: base64
    BadRequestError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - BAD_REQUEST
        message:
          type: string
      allOf:
        - $ref: '#/components/schemas/ProtocolError'
      examples:
        - code: BAD_REQUEST
          message: offset must be -1, now, or a stream offset
    Base64Bytes:
      type: string
      format: byte
      description: Base64-encoded bytes.
    CallbackOk:
      type: object
      required:
        - ok
        - next_wake
      properties:
        ok:
          type: boolean
          enum:
            - true
        next_wake:
          type: boolean
    CallbackRequest:
      type: object
      required:
        - wake_id
        - generation
      properties:
        wake_id:
          $ref: '#/components/schemas/WakeId'
        generation:
          $ref: '#/components/schemas/LeaseGeneration'
        acks:
          type: array
          items:
            $ref: '#/components/schemas/Ack'
        done:
          type: boolean
    CelExpression:
      type: string
      minLength: 1
      description: Common Expression Language expression.
    ClaimRequest:
      type: object
      required:
        - worker
      properties:
        worker:
          $ref: '#/components/schemas/WorkerId'
    ClaimSuccess:
      type: object
      required:
        - wake_id
        - generation
        - token
        - streams
        - lease_ttl_ms
      properties:
        wake_id:
          $ref: '#/components/schemas/WakeId'
        generation:
          $ref: '#/components/schemas/LeaseGeneration'
        token:
          type: string
          format: password
        streams:
          type: array
          items:
            $ref: '#/components/schemas/PendingStream'
        lease_ttl_ms:
          $ref: '#/components/schemas/LeaseTtlMs'
    ClosedConflictHeaders:
      type: object
    ConflictError:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          enum:
            - CONFLICT
        message:
          type: string
      allOf:
        - $ref: '#/components/schemas/ProtocolError'
      examples:
        - code: CONFLICT
          message: stream is closed
    ContentTypeHeader:
      type: object
    CreateStreamRequest:
      type: object
      required:
        - path
      properties:
        path:
          allOf:
            - $ref: '#/components/schemas/StreamRootRelativePath'
          description: Stream-root-relative path. This value may contain slash-separated path segments.
        body:
          type: string
          contentEncoding: base64
    EmptyError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    FencedError:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          enum:
            - FENCED
      allOf:
        - $ref: '#/components/schemas/ProtocolError'
      examples:
        - code: FENCED
    Forbidden:
      type: object
      required:
        - body
      properties:
        body:
          allOf:
            - $ref: '#/components/schemas/EmptyError'
          description: The body type of the operation request or response.
    GoneError:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          enum:
            - GONE
        message:
          type: string
      allOf:
        - $ref: '#/components/schemas/ProtocolError'
      examples:
        - code: GONE
          message: stream was deleted
    IdempotentProducer:
      type: object
      required:
        - id
        - epoch
        - seq
      properties:
        id:
          $ref: '#/components/schemas/ProducerId'
        epoch:
          $ref: '#/components/schemas/ProducerEpoch'
        seq:
          $ref: '#/components/schemas/ProducerSeq'
    JsonWebKey:
      type: object
      required:
        - kty
        - kid
      properties:
        kty:
          type: string
        crv:
          type: string
        kid:
          type: string
        use:
          type: string
          enum:
            - sig
        alg:
          type: string
        x:
          type: string
      allOf:
        - type: object
          unevaluatedProperties: {}
    JsonWebKeySet:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/JsonWebKey'
    LeaseGeneration:
      type: integer
      format: int64
      minimum: 0
      description: Pull-wake lease generation.
    LeaseTtlMs:
      type: integer
      format: int32
      minimum: 1
      description: Lease duration in milliseconds.
    LinkType:
      type: string
      enum:
        - glob
        - explicit
    LiveNoContentHeaders:
      type: object
    MediaType:
      type: string
      minLength: 1
      description: HTTP media type, such as application/json or application/octet-stream.
    NotFoundError:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
        message:
          type: string
      allOf:
        - $ref: '#/components/schemas/ProtocolError'
      examples:
        - code: NOT_FOUND
          message: stream not found
    Offset:
      type: string
      minLength: 1
      description: Opaque stream offset emitted by the server.
    OptionalContentTypeHeader:
      type: object
    PendingStream:
      type: object
      required:
        - path
        - link_type
        - acked_offset
        - tail_offset
        - has_pending
      properties:
        path:
          $ref: '#/components/schemas/StreamRootRelativePath'
        link_type:
          $ref: '#/components/schemas/LinkType'
        acked_offset:
          $ref: '#/components/schemas/Offset'
        tail_offset:
          $ref: '#/components/schemas/Offset'
        has_pending:
          type: boolean
    ProducerEpoch:
      type: integer
      format: int64
      minimum: 0
      description: Monotonic producer epoch.
    ProducerFencedHeaders:
      type: object
    ProducerGapHeaders:
      type: object
    ProducerId:
      type: string
      minLength: 1
      description: Non-empty producer identifier used for idempotent appends.
    ProducerSeq:
      type: integer
      format: int64
      minimum: 0
      description: Zero-based producer sequence number.
    ProducerSuccessHeaders:
      type: object
    ProtocolError:
      type: object
      required:
        - code
      properties:
        code:
          type: string
        message:
          type: string
      discriminator:
        propertyName: code
        mapping:
          CONFLICT: '#/components/schemas/ConflictError'
          NOT_FOUND: '#/components/schemas/NotFoundError'
          GONE: '#/components/schemas/GoneError'
          TOO_MANY_REQUESTS: '#/components/schemas/TooManyRequestsError'
          FENCED: '#/components/schemas/FencedError'
          ALREADY_CLAIMED: '#/components/schemas/AlreadyClaimedError'
          BAD_REQUEST: '#/components/schemas/BadRequestError'
    PullWakeSubscriptionConfig:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - pull-wake
        wake_stream:
          $ref: '#/components/schemas/StreamRootRelativePath'
      allOf:
        - $ref: '#/components/schemas/SubscriptionConfigBase'
    ReadHeaders:
      type: object
    ReleaseRequest:
      type: object
      required:
        - wake_id
        - generation
      properties:
        wake_id:
          $ref: '#/components/schemas/WakeId'
        generation:
          $ref: '#/components/schemas/LeaseGeneration'
    Rfc3339DateTime:
      type: string
      format: date-time
      description: RFC 3339 date-time string.
    Schedule:
      type: object
      required:
        - id
        - status
        - at
        - stream
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ScheduleId'
          readOnly: true
        status:
          allOf:
            - $ref: '#/components/schemas/ScheduleStatus'
          readOnly: true
        at:
          $ref: '#/components/schemas/Rfc3339DateTime'
        stream:
          $ref: '#/components/schemas/StreamRootRelativePath'
    ScheduleId:
      type: string
      minLength: 1
      description: Schedule identifier.
    ScheduleRequest:
      type: object
      required:
        - at
        - stream
        - content_type
      properties:
        at:
          $ref: '#/components/schemas/Rfc3339DateTime'
        stream:
          $ref: '#/components/schemas/StreamRootRelativePath'
        content_type:
          $ref: '#/components/schemas/MediaType'
        body: {}
        body_base64:
          $ref: '#/components/schemas/Base64Bytes'
        producer:
          $ref: '#/components/schemas/IdempotentProducer'
        close:
          type: boolean
      examples:
        - at: '2026-01-01T00:00:00Z'
          stream: events/orders
          content_type: application/json
          body:
            type: order.timeout
            orderId: ord_123
          producer:
            id: scheduler
            epoch: 1
            seq: 42
    ScheduleStatus:
      type: string
      enum:
        - pending
        - fired
        - cancelled
        - failed
    StreamMembershipRequest:
      type: object
      required:
        - streams
      properties:
        streams:
          type: array
          items:
            $ref: '#/components/schemas/StreamRootRelativePath'
    StreamRootRelativePath:
      type: string
      minLength: 1
      description: Stream-root-relative path. The protocol treats this as an application path, not an absolute URL.
    StreamSseControl:
      type: object
      required:
        - streamNextOffset
      properties:
        streamNextOffset:
          $ref: '#/components/schemas/Offset'
        streamCursor:
          type: string
        upToDate:
          type: boolean
          enum:
            - true
        streamClosed:
          type: boolean
          enum:
            - true
    StreamSseEvents:
      anyOf:
        - type: string
        - $ref: '#/components/schemas/StreamSseControl'
      title: SSE event variants emitted while following a stream.
    Subscription:
      type: object
      required:
        - id
        - subscription_id
        - type
        - streams
        - lease_ttl_ms
        - created_at
        - status
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/SubscriptionId'
          readOnly: true
        subscription_id:
          allOf:
            - $ref: '#/components/schemas/SubscriptionId'
          readOnly: true
        type:
          $ref: '#/components/schemas/SubscriptionType'
        pattern:
          type: string
        streams:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionStreamLink'
        webhook:
          $ref: '#/components/schemas/WebhookMetadata'
        wake_stream:
          anyOf:
            - $ref: '#/components/schemas/StreamRootRelativePath'
            - type: 'null'
        filter:
          $ref: '#/components/schemas/WakeFilter'
        lease_ttl_ms:
          $ref: '#/components/schemas/LeaseTtlMs'
        created_at:
          allOf:
            - $ref: '#/components/schemas/Rfc3339DateTime'
          readOnly: true
        status:
          allOf:
            - $ref: '#/components/schemas/SubscriptionStatus'
          readOnly: true
        description:
          type: string
    SubscriptionConfig:
      anyOf:
        - $ref: '#/components/schemas/WebhookSubscriptionConfig'
        - $ref: '#/components/schemas/PullWakeSubscriptionConfig'
      title: Subscription creation request keyed by subscription type.
      examples:
        - type: webhook
          pattern: events/*
          webhook:
            url: https://example.com/durable-streams/webhook
          filter:
            language: cel
            expression: message.type == 'order.created'
          lease_ttl_ms: 30000
          description: Order events webhook
    SubscriptionConfigBase:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/SubscriptionType'
        pattern:
          type: string
        streams:
          type: array
          items:
            $ref: '#/components/schemas/StreamRootRelativePath'
        filter:
          $ref: '#/components/schemas/WakeFilter'
        lease_ttl_ms:
          $ref: '#/components/schemas/LeaseTtlMs'
        description:
          type: string
      discriminator:
        propertyName: type
        mapping:
          pull-wake: '#/components/schemas/PullWakeSubscriptionConfig'
          webhook: '#/components/schemas/WebhookSubscriptionConfig'
    SubscriptionId:
      type: string
      minLength: 1
      description: Subscription identifier.
    SubscriptionStatus:
      type: string
      enum:
        - active
        - failed
    SubscriptionStreamLink:
      type: object
      required:
        - path
        - link_type
        - acked_offset
      properties:
        path:
          $ref: '#/components/schemas/StreamRootRelativePath'
        link_type:
          $ref: '#/components/schemas/LinkType'
        acked_offset:
          $ref: '#/components/schemas/Offset'
    SubscriptionType:
      type: string
      enum:
        - webhook
        - pull-wake
    TailHeaders:
      type: object
    TooManyRequestsError:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          enum:
            - TOO_MANY_REQUESTS
        message:
          type: string
      allOf:
        - $ref: '#/components/schemas/ProtocolError'
      examples:
        - code: TOO_MANY_REQUESTS
          message: retry later
    WakeFilter:
      type: object
      required:
        - language
        - expression
      properties:
        language:
          type: string
          enum:
            - cel
        expression:
          $ref: '#/components/schemas/CelExpression'
        self: {}
    WakeId:
      type: string
      minLength: 1
      description: Durable wake identifier.
    WebhookConfig:
      type: object
      required:
        - url
      properties:
        url:
          $ref: '#/components/schemas/AbsoluteUrl'
      examples:
        - url: https://example.com/durable-streams/webhook
    WebhookMetadata:
      type: object
      properties:
        signing:
          $ref: '#/components/schemas/WebhookSigningMetadata'
      allOf:
        - $ref: '#/components/schemas/WebhookConfig'
    WebhookSigningMetadata:
      type: object
      required:
        - alg
        - kid
        - jwks_url
      properties:
        alg:
          type: string
          enum:
            - ed25519
        kid:
          type: string
        jwks_url:
          $ref: '#/components/schemas/AbsoluteUrl'
    WebhookSubscriptionConfig:
      type: object
      required:
        - type
        - webhook
      properties:
        type:
          type: string
          enum:
            - webhook
        webhook:
          $ref: '#/components/schemas/WebhookConfig'
      allOf:
        - $ref: '#/components/schemas/SubscriptionConfigBase'
    WorkerId:
      type: string
      minLength: 1
      description: Pull-wake worker identifier.
servers:
  - url: '{endpoint}'
    description: Durable Streams server root
    variables:
      endpoint:
        default: ''
        enum:
          - https://example.com
