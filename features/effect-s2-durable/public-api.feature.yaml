feature:
  name: public-api
  product: effect-s2-durable
  description: >-
    The ergonomic public authoring and invocation surface exposed by
    effect-s2-durable. Persistence semantics live in stateless-execution,
    stateful-execution, and workflow-execution; this feature pins the API
    boundary so implementations do not introduce parallel facades or stringly
    alternatives.

components:
  DEFINITIONS:
    name: Authoring definitions
    requirements:
      1: service({ name, handlers }) defines stateless methods as generator functions receiving decoded input directly; authors do not write handlerRequest or Effect.gen wrappers for the common surface.
      2: object({ name, handlers, shared }) defines keyed virtual objects with exclusive handlers and optional shared read-only handlers.
      3: workflow({ name, run, handlers }) defines a run-once workflow as a stateful-execution specialization; it is not a separate persistence boundary.
      4: Handler schemas are declared on the owning definition and are the source of input/output encoding boundaries for public calls, child object calls, shared calls, and workflow starts.

  CLIENTS:
    name: Invocation clients
    requirements:
      1: client(def, key?).method(input) submits and attaches, returning the decoded method result.
      2: sendClient(def, key?).method(input) submits and returns the execution/call id without waiting for completion.
      3: objectClient(def, key).method(input) is the only public durable in-handler call surface to another object; it derives target identity from the object definition and method schema, never raw object/method strings.
      4: objectSendClient(def, key).method(input) is the one-way in-handler send surface and shares the same definition-derived identity and input encoding boundary as objectClient.
      5: sharedClient(def, key).method(input) invokes shared object/workflow handlers over a snapshot and cannot be used to mutate user state or issue durable child calls.

  BY_ID:
    name: By-id resolution
    requirements:
      1: attach(callId) waits for and returns a call's terminal result; poll(callId) returns the current status without blocking.
      2: Object call ids resolve through the owner-stream projection; service call ids resolve through the stateless service result path.
      3: A syntactically valid but unknown object call id resolves to Unknown/NotFound rather than polling forever.

  CALL_ID:
    name: Call-id routing
    requirements:
      1: A call id self-routes; it carries enough schema-decodable identity to locate its execution without a side index or residency.
      2: Object call ids carry an explicit namespace/kind; a service id cannot decode as an object id, and an object id cannot decode as a service id.
      3: By-id APIs branch on id kind before selecting the stateful owner projection or stateless service result path.

  WORKFLOW_API:
    name: Workflow helpers
    requirements:
      1: workflowRunId(def, id) deterministically derives the run call id for a workflow id and decodes to the workflow owner plus reserved run method.
      2: workflowSubmit(def, id, input) starts the workflow at most once and returns started or alreadyStarted.
      3: workflowAttach(def, id) attaches to the workflow run and decodes its result through the run output schema.
      4: A workflow shared handler may resolve a run promise through resolvePromise, which appends ingress for the run owner; it may not mutate user state.
      5: The method name run is reserved for the workflow entrypoint and is rejected for shared handlers at both the type boundary and definition-time guard.

  PRIMITIVES:
    name: Free durable primitives
    requirements:
      1: run, sleep, state, signal, deferred, awakeable, attach, poll, resolveSignal, resolveAwakeable, and resolvePromise are free Effect primitives that delegate to the ambient DurableExecutionRuntime.
      2: Reusable internals remain behind DurableExecutionRuntime.
      3: Durable primitives fail clearly when called outside an active invocation or from an invocation kind that cannot support them.
      4: resolvePromise is valid only inside a shared workflow/object invocation that has an owner run call to target; outside that scope it fails clearly.

constraints:
  UNIFORM_SEMANTICS:
    requirements:
      1: Users must not see partial or divergent primitive semantics depending on whether they chose service, object, or workflow.
      2: The runtime may keep different storage backends for services and objects, but the public primitive contract is identical across compatible surfaces.

  NO_PARALLEL_SURFACE:
    requirements:
      1: Do not add public Actor.admit, Actor.drain, ActorObject, actorClient, validation-only facades, or raw { object, key, method } call APIs as product paths.
      2: There is no public ctx object and no public Actor namespace.

  SCHEMA_DERIVED_IDENTITY:
    requirements:
      1: Public identity construction is schema/definition-derived.
      2: Callers must not hand-build stream paths, delimiter-encoded owner strings, or raw method target strings.
