feature:
  name: resource-spec
  product: effect-s2
  status: deferred
  description: >-
    Deferred exploration of an Effect-native declarative reconciler (S2Spec) for
    S2 basins and singleton streams. Active storage/actor specs should use
    existing effect-s2 control-plane operations or external S2 tooling until a
    concrete reconciler caller exists. Design context:
    docs/sdds/s2-resource-provisioning-sdd.md.

components:
  SPEC_RECONCILE:
    name: Declarative basin/stream reconcile
    requirements:
      1: S2Spec declares basins and explicitly-named streams with BasinConfig/StreamConfig; it does not model tokens or ACLs.
      2: plan(spec) returns a create/reconfigure/no-change diff (+/~/=) without mutating; apply(spec) performs ensureBasin + reconfigureBasin(diff) + ensureStream/reconfigureStream.
      3: apply is idempotent — applying an already-converged spec is a no-op (all "=").
      4: apply performs partial reconcile — only fields present in the spec are updated; unspecified fields are left as-is.
      5: S2Spec is a fold over existing S2Client operations — it introduces no new transport or protocol.

constraints:
  SCOPE:
    requirements:
      1: S2Spec covers coarse, named resources (basins + singleton streams); dynamic per-key/per-execution streams are created at runtime by stream-db open, not declared here.
      2: A runtime/control-plane basin should set createStreamOnAppend false so the data-plane stream set is intentional and stream enumeration is trustworthy.
