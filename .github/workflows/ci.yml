name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
      - eff-sharp

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true

jobs:
  fable:
    name: Fable build and proofs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Install S2 CLI
        run: |
          # Download-then-execute (not curl|bash): a failed/rate-limited
          # download must fail THIS step, not surface later as
          # `spawn s2 ENOENT` mid-proof-run.
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 3 \
            -o /tmp/s2-install.sh \
            https://raw.githubusercontent.com/s2-streamstore/s2/main/install.sh
          bash /tmp/s2-install.sh
          test -x "$HOME/.s2/bin/s2"
          echo "$HOME/.s2/bin" >> "$GITHUB_PATH"

      - name: Check
        run: pnpm run check
