name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
      - eff-sharp

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true

jobs:
  fable:
    name: Fable build and proofs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Install S2 CLI
        run: |
          # Download-then-execute (not curl|bash): a failed/rate-limited
          # download must fail THIS step, not surface later as
          # `spawn s2 ENOENT` mid-proof-run.
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 3 \
            -o /tmp/s2-install.sh \
            https://raw.githubusercontent.com/s2-streamstore/s2/main/install.sh
          bash /tmp/s2-install.sh
          test -x "$HOME/.s2/bin/s2"
          echo "$HOME/.s2/bin" >> "$GITHUB_PATH"

      - name: Check
        # Diagnosability guard (C4 CI ruling): a wedged check must die fast
        # WITH flushed logs — the job-level 45-minute timeout kills the run
        # without surviving output. `timeout` SIGTERMs the check at 25
        # minutes (a healthy check completes well under it), escalating to
        # SIGKILL if it ignores the TERM; the step then names the wedge and
        # fails the job itself, so everything already written to the log
        # survives.
        run: |
          set +e
          timeout --kill-after=30 1500 pnpm run check
          code=$?
          set -e
          if [ "$code" = "124" ] || [ "$code" = "137" ]; then
            echo "CHECK WEDGED (25min)"
            exit 1
          fi
          exit "$code"
