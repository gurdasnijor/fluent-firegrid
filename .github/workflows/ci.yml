name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  TURBO_TELEMETRY_DISABLED: 1

# Per-job setup (pnpm + node + install) lives in the local composite action at
# `.github/actions/setup`. Checkout stays per-job because the durable-streams
# submodule must be checked out before install.
#
# Gating jobs run in parallel so a slow one (tests) stops gating the fast ones
# (lint), and each persists its tool cache so unchanged work is skipped:
#   lint               — eslint + dead-code (knip) + dup (jscpd) + dep boundaries
#   typecheck          — turbo run typecheck
#   effect-diagnostics — effect-language-service diagnostics
#   tests              — turbo run test

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      # ESLint --cache (see the `lint` script) only re-lints files whose content
      # or config changed. Persist it so a typical small-diff PR lints in ~1s.
      # Keyed on the config so any rule change busts the cache.
      - name: Restore ESLint cache
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('eslint.config.js', 'tsconfig.eslint.json', 'pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('eslint.config.js', 'tsconfig.eslint.json', 'pnpm-lock.yaml') }}-

      - name: Lint (eslint)
        run: pnpm run lint

      - name: Dead-code (knip, strict-0)
        run: pnpm run lint:dead

      - name: Dependency boundaries (dep-cruiser)
        run: pnpm run lint:deps

      - name: Duplication (jscpd, strict-0)
        run: pnpm run lint:dup

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      # Turbo content-hashes task inputs and caches the result; persisting the
      # cache lets unchanged packages skip typecheck entirely. Unique per-job key
      # with a shared restore prefix so typecheck/tests/diagnostics seed each
      # other's cache without racing on the same save.
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-typecheck-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm run typecheck

  effect-diagnostics:
    name: Effect diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-diagnostics-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Effect diagnostics
        run: pnpm run diagnostics

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-tests-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install S2 CLI
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            --output /tmp/s2.zip \
            https://github.com/s2-streamstore/s2/releases/download/s2-cli-v0.36.6/s2-x86_64-unknown-linux-gnu.zip
          echo "ea181584c8568a8fc607da894f5299225345268cb7419dfd488baef251eea04e  /tmp/s2.zip" | sha256sum --check
          unzip -q /tmp/s2.zip -d /tmp/s2
          sudo install -m 0755 /tmp/s2/s2 /usr/local/bin/s2
          s2 --version

      - name: Test
        run: pnpm run test
